services:
  nginx-proxy:
    image: docker.io/library/nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/nginx-health"]
      interval: 5s
      timeout: 3s
      retries: 5

  perses:
    image: docker.io/persesdev/perses:v0.53.0
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/perses/config.yaml:ro,z
      - ./provisioning:/etc/perses/provisioning:ro,z
      - perses-data:/perses
    depends_on:
      nginx-proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  perses-data: